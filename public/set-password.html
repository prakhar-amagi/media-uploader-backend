<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Set Password</title>

<style>
body{
  margin:0;
  font-family:Inter,Arial;
  height:100vh;
  background:#111827;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.card{
  background:#1f2937;
  padding:40px;
  border-radius:16px;
  width:360px;
}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  border:none;
  background:#111827;
  color:white;
}

button{
  width:100%;
  margin-top:18px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4f46e5;
  color:white;
  font-weight:600;
  cursor:pointer;
}

.password-wrapper{
  position:relative;
}

.toggle-password{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:13px;
  color:#9ca3af;
}

.msg{
  margin-top:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">
  <h2>Set Your Password</h2>

  <div class="password-wrapper">
    <input id="password" type="password" placeholder="New Password">
    <span class="toggle-password" onclick="togglePassword('password', this)">Show</span>
  </div>

  <button onclick="setPassword()">Set Password</button>

  <div class="msg" id="msg"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get("token");

async function setPassword(){
  const password = document.getElementById("password").value.trim();

  if(!password){
    return alert("Enter password");
  }

  const res = await fetch("/auth/set-password",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ token, password })
  });

  const data = await res.json();

  if(!res.ok){
    document.getElementById("msg").innerText =
      data.error || "Failed to set password";
    return;
  }

  localStorage.setItem("token", data.token);
  localStorage.setItem("email", data.email);
  localStorage.setItem("role", data.role);

  document.getElementById("msg").innerText = "Password set! Redirecting...";

  setTimeout(()=>{
    window.location.href = "/index.html";
  }, 1500);
}

function togglePassword(id, el){
  const input = document.getElementById(id);
  if(input.type === "password"){
    input.type = "text";
    el.innerText = "Hide";
  } else {
    input.type = "password";
    el.innerText = "Show";
  }
}
</script>

</body>
</html>
