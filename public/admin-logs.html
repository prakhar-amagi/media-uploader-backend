<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Logs</title>

<style>
:root {
  --primary: #4f46e5;
  --bg: #f5f7fb;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #111827;
}

body {
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  margin: 0;
  padding: 30px;
  color: var(--text);
}

.container {
  max-width: 1200px;
  margin: auto;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}

.left-actions {
  display: flex;
  gap: 10px;
}

button {
  background: var(--primary);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 8px 14px;
  cursor: pointer;
  font-weight: 600;
}

button.secondary { background: #9ca3af; }
button.danger { background: #ef4444; }

.card {
  background: var(--card);
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.06);
}

table {
  width: 100%;
  border-collapse: collapse;
  font-size: 14px;
}

th {
  background: #111827;
  color: white;
  padding: 10px;
  text-align: left;
}

td {
  border-bottom: 1px solid #eee;
  padding: 10px;
  vertical-align: top;
}

pre {
  margin: 0;
  font-size: 12px;
  white-space: pre-wrap;
  word-break: break-word;
}

.user-menu {
  position: relative;
}

.dropdown {
  display: none;
  position: absolute;
  top: 42px;
  right: 0;
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  min-width: 120px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">

  <div class="left-actions">
    <button class="secondary" onclick="goToDashboard()">⬅ Dashboard</button>
    <button class="secondary" id="adminBtn" onclick="goToAdmin()">⚙ Admin Panel</button>
  </div>

  <div class="user-menu">
    <button onclick="toggleMenu()" style="background:#111827;">
      👤 Account ▾
    </button>

    <div id="menu" class="dropdown">
      <button class="danger" onclick="logout()">Logout</button>
    </div>
  </div>

</div>

<div class="card">
  <h2>📜 Activity Logs</h2>

  <table>
    <thead>
      <tr>
        <th>Time (UTC)</th>
        <th>User</th>
        <th>Action</th>
        <th>Channel</th>
        <th>Platform</th>
        <th>Details</th>
      </tr>
    </thead>
    <tbody id="logsBody"></tbody>
  </table>
</div>

</div>

<script>
const token = localStorage.getItem("token");
const role = localStorage.getItem("role");

/* ---------- AUTH CHECK ---------- */
if (!token) {
  window.location.href = "/login.html";
}

/* ---------- ROLE CHECK ---------- */
const adminBtn = document.getElementById("adminBtn");

if (role !== "admin") {
  // hide admin button if not admin
  adminBtn.style.display = "none";
}

/* ---------- NAVIGATION ---------- */
function goToDashboard() {
  window.location.href = "/index.html";
}

function goToAdmin() {
  if (role !== "admin") {
    alert("❌ Admin access only");
    return;
  }
  window.location.href = "/admin.html";
}

/* ---------- SESSION ---------- */
function logout() {
  localStorage.clear();
  window.location.href = "/login.html";
}

/* ---------- MENU ---------- */
function toggleMenu() {
  const menu = document.getElementById("menu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// close dropdown if clicked outside
window.addEventListener("click", function(e) {
  const menu = document.getElementById("menu");
  if (!e.target.closest(".user-menu")) {
    menu.style.display = "none";
  }
});

/* ---------- LOAD LOGS ---------- */
async function loadLogs() {
  try {
    const res = await fetch("/admin/logs", {
      headers: {
        Authorization: "Bearer " + token
      }
    });

    if (res.status === 401 || res.status === 403) {
      logout();
      return;
    }

    const logs = await res.json();
    const tbody = document.getElementById("logsBody");
    tbody.innerHTML = "";

    if (!logs || logs.length === 0) {
      tbody.innerHTML = `
        <tr>
          <td colspan="6" style="text-align:center; padding:20px;">
            No logs found
          </td>
        </tr>`;
      return;
    }

    logs.forEach(log => {
      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${new Date(log.createdAt).toUTCString()}</td>
        <td>${log.userEmail || "-"}</td>
        <td><strong>${log.action}</strong></td>
        <td>${log.channel || "-"}</td>
        <td>${log.platform || "-"}</td>
        <td><pre>${JSON.stringify(log.details || {}, null, 2)}</pre></td>
      `;

      tbody.appendChild(row);
    });

  } catch (err) {
    console.error("Logs error:", err);
    alert("❌ Failed to load logs");
  }
}

loadLogs();
</script>

</body>
</html>
