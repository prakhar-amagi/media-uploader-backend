<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Promo Manager Login</title>

<style>
body{
  margin:0;
  font-family:Inter,Arial;
  height:100vh;
  background:url("https://now3.amagi.tv/6661d5ad44b4660823bc.jpg") no-repeat center center/cover;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.card{
  background:rgba(0,0,0,0.65);
  padding:40px;
  border-radius:18px;
  width:360px;
  box-shadow:0 25px 60px rgba(0,0,0,0.7);
}

h1{
  margin:0 0 20px 0;
  font-size:24px;
  text-align:center;
}

input{
  width:100%;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
  border:none;
  background:#111827;
  color:white;
}

.password-wrapper{
  position:relative;
}

.toggle-password{
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  cursor:pointer;
  font-size:13px;
  color:#9ca3af;
}

button{
  width:100%;
  margin-top:18px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#4f46e5;
  color:white;
  font-weight:600;
  font-size:15px;
  cursor:pointer;
}

button:hover{opacity:.9}

.error{
  margin-top:12px;
  color:#f87171;
  text-align:center;
}
</style>
</head>

<body>

<form class="card" onsubmit="login(event)">
  <h1>🎬 Promo Manager</h1>

  <input id="email" placeholder="Email">

  <div class="password-wrapper">
    <input id="password" type="password" placeholder="Password">
    <span class="toggle-password" onclick="togglePassword()">Show</span>
  </div>

  <button type="submit">Login</button>

  <!-- ✅ Forgot Password -->
  <div style="margin-top:10px;text-align:center;">
    <a href="/forgot.html" style="color:#9ca3af; font-size:13px;">
      Forgot Password?
    </a>
  </div>

  <div class="error" id="error"></div>
</form>

<script>

function togglePassword(){
  const passwordInput = document.getElementById("password");
  const toggleText = document.querySelector(".toggle-password");

  if(passwordInput.type === "password"){
    passwordInput.type = "text";
    toggleText.innerText = "Hide";
  } else {
    passwordInput.type = "password";
    toggleText.innerText = "Show";
  }
}

async function login(e){
  e.preventDefault(); // ✅ prevents page reload

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  const res = await fetch("/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({email,password})
  });

  const data = await res.json();

  if(!res.ok){
    document.getElementById("error").innerText = data.error || "Invalid login";
    return;
  }

  localStorage.setItem("token",data.token);
  localStorage.setItem("role",data.role);
  localStorage.setItem("email",data.email);

  window.location.href="/index.html";
}

</script>

</body>
</html>
